apiVersion : monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ingress-service-monitor
  namespace: monitoring
  labels:
    release: prometheus-stack

spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ingress-nginx   # Searching services
  
  namespaceSelector:  
    matchNames:
      - ingress-nginx      # Which ns be searching
  
  endpoints:
    - port: metrics
      interval: 30s




