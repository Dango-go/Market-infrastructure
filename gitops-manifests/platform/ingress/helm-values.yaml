fullnameOverride: ingress-nginx  

 
controller:
  name: controller  
  kind: Deployment
  
  replicaCount: 2

  extraArgs:
    enable-ssl-passthrough: "true"

  ingressClassResource:
    name: nginx  
    enabled: true  
    default: false  
    controllerValue: k8s.io/ingress-nginx  

  
  
  watchIngressWithoutClass: false

  
  ingressClassByName: true

  
  
  allowSnippetAnnotations: false

  
  
  
  config:
    
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
    enable-real-ip: "true"

    
    log-format-escape-json: "true"
    log-format-upstream: >-
      {"time":"$time_iso8601","remote_addr":"$remote_addr","x_forwarded_for":"$proxy_add_x_forwarded_for","request_id":"$req_id","remote_user":"$remote_user","bytes_sent":$bytes_sent,"request_time":$request_time,"status":$status,"vhost":"$host","request_proto":"$server_protocol","path":"$uri","request_query":"$args","request_length":$request_length,"duration":$request_time,"method":"$request_method","http_referrer":"$http_referer","http_user_agent":"$http_user_agent","upstream_addr":"$upstream_addr","upstream_response_time":"$upstream_response_time","upstream_status":"$upstream_status"}

    
    proxy-connect-timeout: "10"
    proxy-send-timeout: "60"
    proxy-read-timeout: "60"
    proxy-next-upstream-timeout: "0"

    
    proxy-body-size: "20m"

    
    proxy-buffering: "on"
    proxy-buffer-size: "16k"
    proxy-buffers-number: "8"
    large-client-header-buffers: "4 16k"

    
    upstream-keepalive-connections: "320"
    upstream-keepalive-timeout: "60"
    upstream-keepalive-requests: "10000"
    keep-alive: "75"
    keep-alive-requests: "1000"

    
    use-gzip: "true"
    gzip-level: "5"
    gzip-types: >-
      application/atom+xml application/javascript application/x-javascript
      application/json application/rss+xml application/vnd.ms-fontobject
      application/x-font-ttf application/x-web-app-manifest+json
      application/xhtml+xml application/xml font/opentype image/svg+xml
      image/x-icon text/css text/plain text/x-component

    
    
    hsts: "true"
    hsts-include-subdomains: "true"
    hsts-max-age: "31536000"
    hsts-preload: "false"

    
    server-tokens: "false"

    
    generate-request-id: "true"

    
    annotations-risk-level: "Medium"

  
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 75
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 50
            periodSeconds: 60
      scaleUp:
        stabilizationWindowSeconds: 60
        policies:
          - type: Percent
            value: 100
            periodSeconds: 60
          - type: Pods
            value: 2
            periodSeconds: 60
        selectPolicy: Max

  
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  
  minAvailable: 1

  
  terminationGracePeriodSeconds: 300

  
  lifecycle:
    preStop:
      exec:
        command:
          - /wait-shutdown

  
  livenessProbe:
    httpGet:
      path: /healthz
      port: 10254
      scheme: HTTP
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 5

  readinessProbe:
    httpGet:
      path: /healthz
      port: 10254
      scheme: HTTP
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 3

  
  podSecurityContext:
    runAsNonRoot: true

  
  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 82
    allowPrivilegeEscalation: false
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop:
        - ALL
      add:
        - NET_BIND_SERVICE

  
  
  nodeSelector:
    kubernetes.io/os: linux

  tolerations: []

  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - ingress-nginx
                - key: app.kubernetes.io/component
                  operator: In
                  values:
                    - controller
            topologyKey: kubernetes.io/hostname

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: ingress-nginx
          app.kubernetes.io/component: controller

  
  service:
    enabled: true
    type: LoadBalancer

    
    
    annotations:
      cloud.google.com/network-tier: "Premium"

    externalTrafficPolicy: Local

 
    loadBalancerSourceRanges: []

    ports:
      http: 80
      https: 443

    targetPorts:
      http: http
      https: https

  publishService:
    enabled: true

# ingress-nginx-controller-metrics
  metrics:
    enabled: true
  # service
    service:
      enabled: true
      name: ingress-nginx
      labels:
        app.kubernetes.io/name: ingress-nginx
        app.kubernetes.io/component: controller
      servicePort: 10254  # Port which listen process nginx-exporter in pod nginx-ingress
      annotations: {}
  # service monitor
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: prometheus-stack
      namespace: ingress-nginx
 
  admissionWebhooks:
    enabled: true  # auto open 10254
    failurePolicy: Fail
    timeoutSeconds: 10

    patch:
      enabled: true

      podAnnotations: {}

      nodeSelector:
        kubernetes.io/os: linux

      tolerations: []

      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        fsGroup: 2000

    certManager:
      enabled: false

  networkPolicy:
    enabled: true

 
  dnsPolicy: ClusterFirst

 
 
  priorityClassName: ""

 
  podLabels:
    app.kubernetes.io/part-of: ingress

  podAnnotations: {}

 
  extraEnvs: []
 
  extraVolumes: []
  extraVolumeMounts: []
 
tcp: {}
udp: {}

 
defaultBackend:
  enabled: false

rbac:
  create: true
  scope: false

serviceAccount:
  create: true
  name: ingress-nginx
  automountServiceAccountToken: true
  annotations: {}

 
revisionHistoryLimit: 10

