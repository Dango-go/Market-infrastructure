apiVersion: apps/v1
 
kind: Deployment
metadata:
  name: auth
  namespace: application
  labels:
    app: auth
    tier: backend
  annotations:
    env: dev
spec:
  replicas: 3  

  selector:
    matchLabels:
      app: auth
      tier: backend

  strategy:
    type: RollingUpdate 
    rollingUpdate:
  
       
      maxUnavailable: 25%  # Min 75% work
      maxSurge: 25%  # Min create at the one update

 
  template:
    metadata:
      labels:
 
        app: payment
        tier: backend
      annotations:
        checksum/config: "a1b2c3d4e5f6"

    spec:
      #imagePullSecrets:
        #- name: gitlab-registry-secret

 
      terminationGracePeriodSeconds: 40

   
      securityContext:
        runAsNonRoot: true  
        runAsUser: 1000     
        fsGroup: 2000       

 
      #initContainers:
        #- name: wait-for-database
          #image: busybox:1.36
 
          #command: ['sh', '-c', 'until nc -z db-service.default.svc.cluster.local 5432; do echo "waiting for db"; sleep 2; done;']

        #- name: run-database-migrations
          #image: my-registry/payment-service-migrations:v1.2.0
 
          #envFrom:
            #- secretRef:
                #name: db-credentials

 
      containers:
        - name: auth
          image: my-registry/payment-service:v1.2.0
          imagePullPolicy: IfNotPresent  

 
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
 
          resources:
            requests:
 
              cpu: 250m
              memory: 512Mi
            limits:
   
              cpu: 1000m
              memory: 1Gi

 
          env:
 
            - name: LOG_LEVEL
              value: "info"
 
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: payment-config
                  key: db_host
            
 
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            
 
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MY_NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP

 
          envFrom:
            - configMapRef:
                name: payment-global-config

 
          volumeMounts:
            - name: app-config-file
              mountPath: /etc/config/app.yml  
              subPath: app.yml
              readOnly: true
            - name: tmp-storage
              mountPath: /tmp  
 
          securityContext:
            allowPrivilegeEscalation: false  
            readOnlyRootFilesystem: true    
            capabilities:
              drop: ["ALL"]                  

 
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            failureThreshold: 30
            periodSeconds: 10

 
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 5  
            periodSeconds: 10       
            timeoutSeconds: 3       
            failureThreshold: 3     
 
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1  

   
          lifecycle:
            preStop:
 
              exec:
                command: ["sh", "-c", "sleep 10"]

 
      nodeSelector:
        type: high-cpu

      affinity:
 
        nodeAffinity:
 
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - eu-central-1a
 
        podAffinity:
 
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - redis-cache
                topologyKey: kubernetes.io/hostname
 
        podAntiAffinity:
 
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - payment
              topologyKey: kubernetes.io/hostname
 
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: payment

 
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "payment"
          effect: "NoSchedule"
 
      volumes:
 
        - name: app-config-file
          configMap:
            name: payment-config
 
        - name: tmp-storage
          emptyDir:
 
            sizeLimit: 500Mi
