apiVersion: apps/v1
 
kind: Deployment
metadata:
  name: api-gateway
  namespace: application
  labels:
    application: service
  annotations:
    env: dev


spec:
  replicas: 3  

  selector:
    matchLabels:
      app: api-gateway
      tier: backend

  strategy:
    type: RollingUpdate 
    rollingUpdate:
      maxUnavailable: 25%  # Min 75% work
      maxSurge: 25%  # Min create at the one update

  template:
    metadata:
      labels:
 
        app: api-gateway
        tier: backend

    spec:
      #imagePullSecrets:
        #- name: gitlab-registry-secret

      terminationGracePeriodSeconds: 40

      securityContext:
        runAsNonRoot: true  
        runAsUser: 1000     
        fsGroup: 2000       

 
      #initContainers:
        #- name: wait-for-database
          #image: busybox:1.36
 
          #command: ['sh', '-c', 'until nc -z db-service.default.svc.cluster.local 5432; do echo "waiting for db"; sleep 2; done;']

        #- name: run-database-migrations
          #image: my-registry/payment-service-migrations:v1.2.0
 
          #envFrom:
            #- secretRef:
                #name: db-credentials

      containers:
        - name: api-gateway
          image: europe-central2-docker.pkg.dev/market-infrastructure/market-images/api-gateway-service:latest
          imagePullPolicy: IfNotPresent  

          # docs which port listen
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
 
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

          # All URLs services             
          envFrom:
            - configMapRef:
                name: services-urls


          env:
            - name: SERVICE_NAME
              value: "api-gateway-service"

            - name: JWT_ISSUER
              value: "embedded-market-auth"
 
            - name: JWT_AUDIENCE
              value: "embedded-market"
            
            # JWT
            - name: JWT_PUBLIC_KEY_FILE
              valueFrom:
                secretKeyRef:
                  name: jwt-token
                  key: public_key.pem
            
            - name: HTTP_PORT
              value: "8080"
            
            - name: LOG_LEVEL
              value: "info"

            - name: ENVIRONMENT
              value: "development"

 
 
          securityContext:
            allowPrivilegeEscalation: false  
            readOnlyRootFilesystem: true    
            capabilities:
              drop: ["ALL"]                  

 
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 30
            periodSeconds: 10

 
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5  
            periodSeconds: 10       
            timeoutSeconds: 3       
            failureThreshold: 2     
 
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1  

   
          lifecycle:
            preStop:
 
              exec:
                command: ["sh", "-c", "sleep 10"]

 
      nodeSelector:
        type: development

      affinity:
 
        nodeAffinity:
 
          preferredDuringSchedulingIgnoredDuringExecution:  # soft
            - weight: 100
              preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - "europe-central2"

 
        podAntiAffinity:
 
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: env
                    operator: In
                    values:
                      - production
              topologyKey: kubernetes.io/hostname
 
      topologySpreadConstraints:
        - maxSkew: 1    
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule  # ScheduleAnyway alternative
          labelSelector:
            matchLabels:
              app: api-gateway

 
      tolerations:
        - key: "type"
          operator: "Equal"
          value: "development"
          effect: "NoSchedule"
 

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: application
  labels:
    application: service
    app: api-gateway
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: api-gateway
    tier: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
