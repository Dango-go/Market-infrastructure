apiVersion: apps/v1
 
kind: Deployment
metadata:
  name: catalog 
  namespace: application
  labels:
    application: service
  annotations:
    env: dev
spec:
  replicas: 3  

  selector:
    matchLabels:
      app: catalog
      tier: backend

  strategy:
    type: RollingUpdate 
    rollingUpdate:
  
       
      maxUnavailable: 25%  # Min 75% work
      maxSurge: 25%  # Min create at the one update

 
  template:
    metadata:
      labels:
        app: catalog
        tier: backend


    spec:
      #imagePullSecrets:
        #- name: gitlab-registry-secret

 
      terminationGracePeriodSeconds: 40

   
      securityContext:
        runAsNonRoot: true  
        runAsUser: 1000     
        fsGroup: 2000       

 
      #initContainers:
        #- name: wait-for-database
          #image: busybox:1.36
 
          #command: ['sh', '-c', 'until nc -z db-service.default.svc.cluster.local 5432; do echo "waiting for db"; sleep 2; done;']

        #- name: run-database-migrations
          #image: my-registry/payment-service-migrations:v1.2.0
 
          #envFrom:
            #- secretRef:
                #name: db-credentials
      
 
      containers:
        - name: catalog
          image: europe-central2-docker.pkg.dev/market-infrastructure/market-images/catalog-service:latest
          imagePullPolicy: IfNotPresent  

          # docs which port listen
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
            - name: metrics
              containerPort: 9090
 
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi

          env:
            - name: SERVICE_NAME
              value: "catalog-service"

            - name: JWT_ISSUER
              value: "embedded-market-auth"
            
            - name: KAFKA_BROKERS
              value: kafka:9092
 
            - name: JWT_AUDIENCE
              value: "embedded-market"

            - name: POSTGRES_DSN
              value: "postgres://catalog:catalog@postgres-cluster-rw:5432/catalog-db-v1?sslmode=disable"

            # JWT
            - name: JWT_PUBLIC_KEY_FILE
              valueFrom:
                secretKeyRef:
                  name: jwt-token
                  key: public_key.pem
            
            - name: HTTP_PORT
              value: "8083"
            
            - name: LOG_LEVEL
              value: "info"

            - name: ENVIRONMENT
              value: development

 
 
          securityContext:
            allowPrivilegeEscalation: false  
            readOnlyRootFilesystem: true    
            capabilities:
              drop: ["ALL"]                  

 
          startupProbe:
            httpGet:
              path: /healthz
              port: 8083
            failureThreshold: 30
            periodSeconds: 10

 
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8083
            initialDelaySeconds: 5  
            periodSeconds: 10       
            timeoutSeconds: 3       
            failureThreshold: 2     
 
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1  

   
          lifecycle:
            preStop:
 
              exec:
                command: ["sh", "-c", "sleep 10"]

 
      nodeSelector:
        type: development

      affinity:
 
        nodeAffinity:
 
          preferredDuringSchedulingIgnoredDuringExecution:  # soft
            - weight: 100
              preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - "europe-central2"
 
        podAffinity:
 
          preferredDuringSchedulingIgnoredDuringExecution:  
            - weight: 75
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: kubernetes.io/db
                      operator: In
                      values: 
                        - catalog
                       
                topologyKey: kubernetes.io/hostname   # Group by this label
 
        podAntiAffinity:
 
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: env
                    operator: In
                    values:
                      - production
              topologyKey: kubernetes.io/hostname
 
      topologySpreadConstraints:
        - maxSkew: 1    
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule  # ScheduleAnyway alternative
          labelSelector:
            matchLabels:
              app: catalog

 
      tolerations:
        - key: "type"
          operator: "Equal"
          value: "development"
          effect: "NoSchedule"
 

---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: application
  labels:
    application: service
    app: catalog
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: catalog
    tier: backend
  ports:
    - name: http
      port: 8083
      targetPort: 8083
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
