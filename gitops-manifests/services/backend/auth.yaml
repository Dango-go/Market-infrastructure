apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: application
  labels:
    application: service
  annotations:
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
      tier: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  template:
    metadata:
      labels:
        app: auth
        tier: backend
    spec:
      terminationGracePeriodSeconds: 40
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
      - name: auth
        image: dango17/auth-service:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8081
          protocol: TCP
        - name: metrics
          containerPort: 9090
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 50m
            memory: 64Mi

      
        volumeMounts:
        - name: jwt-key-private-volume
          mountPath: /etc/secrets/jwt/
          readOnly: true 

        env:
        - name: SERVICE_NAME
          value: analytics-service
        - name: JWT_ISSUER
          value: embedded-market-auth
        - name: KAFKA_BROKERS
          value: kafka:9092
        - name: JWT_AUDIENCE
          value: embedded-market
        - name: POSTGRES_DSN
          value: postgres://auth:auth@postgres-cluster-rw.storage.svc.cluster.local:5432/auth-db-v1?sslmode=disable
        - name: JWT_PRIVATE_KEY_FILE
          value: /etc/secrets/jwt/private_key.pem
        - name: HTTP_PORT
          value: '8081'
        - name: LOG_LEVEL
          value: debug
        - name: ENVIRONMENT
          value: development
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        startupProbe:
          httpGet:
            path: /healthz
            port: 8081
          failureThreshold: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
        lifecycle:
          preStop:
            exec:
              command:
              - sh
              - -c
              - sleep 10
      nodeSelector:
        type: development
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: env
                operator: In
                values:
                - production
            topologyKey: kubernetes.io/hostname
      tolerations:
      - key: type
        operator: Equal
        value: development
        effect: NoSchedule
    
    # volumes
      volumes:
      - name: jwt-key-private-volume
        secret:
          secretName: jwt-token-private 

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: application
  labels:
    application: service
    app: auth
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: auth
    tier: backend
  ports:
  - name: http
    port: 8081
    targetPort: 8081
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
