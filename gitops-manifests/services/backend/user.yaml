apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: application
  labels:
    application: service
  annotations:
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user
      tier: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  template:
    metadata:
      labels:
        app: user
        tier: backend
    spec:
      terminationGracePeriodSeconds: 40
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
      - name: user
        image: dango17/user-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8082
          protocol: TCP
        - name: metrics
          containerPort: 9090

        # volume mounts
        volumeMounts:
        - name: jwt-key-volume
          mountPath: /etc/secrets/jwt/
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 50m
            memory: 64Mi
        env:
        - name: SERVICE_NAME
          value: user-service
        - name: JWT_ISSUER
          value: embedded-market-auth
        - name: JWT_AUDIENCE
          value: embedded-market
        - name: KAFKA_BROKERS
          value: kafka:9092
        - name: POSTGRES_DSN
          value: postgres://user:user@postgres-cluster-rw.storage.svc.cluster.local:5432/user-db-v1?sslmode=disable
        - name: JWT_PUBLIC_KEY_FILE
          value: /etc/secrets/jwt/public_key.pem
        - name: HTTP_PORT
          value: '8082'
        - name: LOG_LEVEL
          value: info
        - name: ENVIRONMENT
          value: development
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        startupProbe:
          httpGet:
            path: /healthz
            port: 8082
          failureThreshold: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
        lifecycle:
          preStop:
            exec:
              command:
              - sh
              - -c
              - sleep 10
      nodeSelector:
        type: development
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: env
                operator: In
                values:
                - production
            topologyKey: kubernetes.io/hostname
      tolerations:
      - key: type
        operator: Equal
        value: development
        effect: NoSchedule
      # volumes
      volumes:
      - name: jwt-key-volume
        secret:
          secretName: jwt-token
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: application
  labels:
    application: service
    app: user
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: user
    tier: backend
  ports:
  - name: http
    port: 8082
    targetPort: 8082
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
