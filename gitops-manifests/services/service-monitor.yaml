apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: application-monitor
  namespace: application
  labels:
    release: prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - application

  selector:
    matchLabels:
      application: service

  endpoints:

    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s

      # rename labels
      relabelings:
        - separator: ;
          regex: __meta_kubernetes_pod_name  #applies to labels from sourcelabels
          replacement: $1
          sourceLabels:  # every parameters in settings will with label __meta__
            - __meta_kubernetes_pod_name  # only pod name label
          targetLabel: kubernetes_pod_name  # final label

        - sourceLabels: [__meta_kubernetes_pod_label_app]  # scanning every pod with this label. Coppied value and get app="value"
          targetLabel: app

        - sourceLabels: [__meta_kubernetes_pod_label_tier]
          targetLabel: tier
