apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: application 
  labels:
    app: frontend
    tier: web
spec:
  replicas: 3
 
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        
      maxUnavailable: 1  
 
  selector:
    matchLabels:
      app: frontend
      tier: web
 
  template:
    metadata:
      labels:
        app: frontend
        tier: web
    spec:
      containers:
      - name: frontend-container
 
        image: europe-central2-docker.pkg.dev/market-infrastructure/market-images/frontend-service:latest
        imagePullPolicy: IfNotPresent
        
        ports:
        - containerPort: 80
          name: http
          
        env:
        - name: NODE_ENV
          value: "production"
        - name: API_URL
          value: "https://api.yourdomain.com"
          
         
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
            
 
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15 
          periodSeconds: 20      
          timeoutSeconds: 3        
          failureThreshold: 3      
          
   
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 3
          
 