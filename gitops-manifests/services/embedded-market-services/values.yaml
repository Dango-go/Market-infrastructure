namespace: application
deploymentDefaults:
  replicas: 1
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []
  terminationGracePeriodSeconds: 40
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 2000
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
      - ALL
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 50m
      memory: 64Mi
  probes:
    startup:
      enabled: true
      failureThreshold: 30
      periodSeconds: 10
    liveness:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 2
    readiness:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 10
      successThreshold: 1
  lifecycle:
    preStop:
      exec:
        command:
        - sh
        - -c
        - sleep 10
  nodeSelector:
    type: development
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
          - key: env
            operator: In
            values:
            - production
        topologyKey: kubernetes.io/hostname
  tolerations:
  - key: type
    operator: Equal
    value: development
    effect: NoSchedule
services:
  analytics:
    enabled: true
    name: analytics
    tier: backend
    replicas: 1
    image: europe-central2-docker.pkg.dev/market-infrastructure/market-images/analytics-service:latest
    imagePullPolicy: IfNotPresent
    ports:
    - name: http
      containerPort: 8094
      protocol: TCP
    - name: metrics
      containerPort: 9090
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 50m
        memory: 64Mi
    env:
    - name: SERVICE_NAME
      value: analytics-service
    - name: JWT_ISSUER
      value: embedded-market-auth
    - name: JWT_AUDIENCE
      value: embedded-market
    - name: POSTGRES_DSN
      value: postgres://analytics:analytics@postgres-cluster-rw.storage.svc.cluster.local:5432/analytics-db-v1?sslmode=disable
    - name: JWT_PUBLIC_KEY_FILE
      value: /etc/secrets/jwt/public_key.pem
    - name: HTTP_PORT
      value: '8094'
    - name: LOG_LEVEL
      value: debug
    - name: ENVIRONMENT
      value: development
    health:
      port: 8094
      path: /healthz
      readinessPath: /readyz
    service:
      enabled: true
      name: analytics-service
      type: ClusterIP
      ports:
      - name: http
        port: 8094
        targetPort: 8094
        protocol: TCP
      - name: metrics
        port: 9090
        targetPort: 9090
        protocol: TCP
    annotations:
      env: dev
    imagePullSecrets:
    - name: artifact-registry-secret
    volumeMounts:
    - name: jwt-key-volume
      mountPath: /etc/secrets/jwt/
      readOnly: true
    volumes:
    - name: jwt-key-volume
      secret:
        secretName: jwt-token
  api-gateway:
    enabled: true
    name: api-gateway
    tier: backend
    replicas: 1
    image: europe-central2-docker.pkg.dev/market-infrastructure/market-images/api-gateway-service:latest
    imagePullPolicy: IfNotPresent
    ports:
    - name: http
      containerPort: 8080
      protocol: TCP
    - name: metrics
      containerPort: 9090
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 50m
        memory: 64Mi
