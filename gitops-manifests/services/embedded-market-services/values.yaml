    public_key.pem: ''
- name: jwt-token-private
  namespace: application
  create: false
  type: Opaque
  stringData:
    public_key.pem: ''
serviceMonitor:
  enabled: true
  name: application-monitor
  namespace: application
  labels:
    release: prometheus-stack
  namespaceSelector:
    matchNames:
    - application
  selector:
    matchLabels:
      application: service
  endpoints:
  - port: tcp-prometheus
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s
    relabelings:
    - separator: ;
      regex: __meta_kubernetes_pod_name
      replacement: $1
      sourceLabels:
      - __meta_kubernetes_pod_name
      targetLabel: kubernetes_pod_name
  - port: metrics
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s
    relabelings:
    - separator: ;
      regex: __meta_kubernetes_pod_name
      replacement: $1
      sourceLabels:
      - __meta_kubernetes_pod_name
      targetLabel: kubernetes_pod_name
kafkaTopics:
  enabled: true
  namespace: kafka
  cluster: prod-cluster
  defaults:
    partitions: 3
    replicas: 3
    config:
      cleanup.policy: delete
      retention.ms: 604800000
      min.insync.replicas: 2
  topics:
  - name: user.registered
  - name: user.profile.created
  - name: user.profile.updated
  - name: user.addresses.updated
  - name: user.preferences.updated
  - name: user.wishlist.updated
  - name: product.created
  - name: product.updated
  - name: product.compatibility.updated
  - name: stock.adjusted
  - name: stock.reserved
  - name: stock.released
  - name: price.changed
  - name: promotion.started
  - name: cart.checked_out
  - name: order.created
  - name: order.status.updated
  - name: shipment.created
  - name: shipment.status.updated
  - name: payment.created
  - name: payment.succeeded
  - name: payment.failed
  - name: payment.refunded
  - name: user.followed
  - name: project.created
  - name: project.updated
  - name: version.released
  - name: artifact.uploaded
  - name: download.completed
  - name: review.created
  - name: comment.created
  - name: star.added
  - name: notification.sent
  - name: analytics.updated
