  recommendation-service:
    <<: *backend-common
    build:
      context: ./app/backend
      dockerfile: ./Dockerfile.service
      args:
        SERVICE: recommendation
    environment:
      <<: *backend-common-env
      SERVICE_NAME: recommendation-service
      HTTP_PORT: 8093
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/recommendation?sslmode=disable
