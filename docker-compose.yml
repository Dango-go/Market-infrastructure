  api-gateway:
    <<: *backend-common
    build:
      context: ./app/backend
      dockerfile: ./Dockerfile.service
      args:
        SERVICE: api-gateway
    environment:
      <<: *backend-common-env
      SERVICE_NAME: api-gateway
      HTTP_PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:8081
      USER_SERVICE_URL: http://user-service:8082
      CATALOG_SERVICE_URL: http://catalog-service:8083
      INVENTORY_SERVICE_URL: http://inventory-service:8084
      PRICING_SERVICE_URL: http://pricing-service:8085
      CART_SERVICE_URL: http://cart-service:8086
      ORDER_SERVICE_URL: http://order-service:8087
      SHIPPING_SERVICE_URL: http://shipping-service:8088
      PAYMENT_SERVICE_URL: http://payment-service:8089
      NOTIFICATION_SERVICE_URL: http://notification-service:8090
      WISHLIST_SERVICE_URL: http://wishlist-service:8095
      SEARCH_SERVICE_URL: http://search-service:8091
      REVIEW_SERVICE_URL: http://review-service:8092
      RECOMMENDATION_SERVICE_URL: http://recommendation-service:8093
      ANALYTICS_SERVICE_URL: http://analytics-service:8094
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      catalog-service:
        condition: service_started
      inventory-service:
        condition: service_started
      pricing-service:
        condition: service_started
      cart-service:
        condition: service_started
      order-service:
        condition: service_started
      shipping-service:
        condition: service_started
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started
      wishlist-service:
        condition: service_started
      search-service:
        condition: service_started
      review-service:
        condition: service_started
      recommendation-service:
        condition: service_started
      analytics-service:
        condition: service_started
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./app/frontend
      dockerfile: ./Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_started
    ports:
      - "5173:8080"
    networks:
      - embedded-market

volumes:
  postgres_data:
  redis_data:
  redpanda_data:

networks:
  embedded-market:
    driver: bridge
