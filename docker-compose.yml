        condition: service_healthy
    ports:
      - "8091:8091"

  review-service:
    <<: *backend-common
    build:
      context: ./app/backend
      dockerfile: ./Dockerfile.service
      args:
        SERVICE: review
    environment:
      <<: *backend-common-env
      SERVICE_NAME: review-service
      HTTP_PORT: 8092
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/review?sslmode=disable
    depends_on:
